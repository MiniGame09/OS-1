<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { 
            --phone-pink: #fbc4ab; 
            --grey-light: #f0f0f0; 
            --anim-duration: 0.5s;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            background-color: #323131; user-select: none; touch-action: none;
            font-family: 'Roboto', sans-serif;
        }
        .phone-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        svg { max-width: 100%; max-height: 100%; filter: drop-shadow(0 30px 60px rgba(239, 232, 232, 0.356)); pointer-events: all; }

        #screen-content { opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .screen-on #screen-content { opacity: 1; pointer-events: all; }

        #wallpaper {
            transition: transform 5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.6s ease;
            transform-origin: center center;
        }
        .app-active #wallpaper, .cc-active #wallpaper { 
            transform: scale(1.1); 
            filter: blur(0px) brightness(0.3) 
        }

        #pages-container { 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .app-entity {
            transition: x var(--anim-duration) cubic-bezier(0.6, -0, 0.1, 1),
                        y var(--anim-duration) cubic-bezier(0.6, -0, 0.1, 1),
                        width var(--anim-duration) cubic-bezier(0.6, -0, 0.1, 1),
                        height var(--anim-duration) cubic-bezier(0.6, -0, 0.1, 1),
                        rx var(--anim-duration) cubic-bezier(0.6, -0, 0.1, 1);
            cursor: pointer;
        }

        .active-app-state .app-entity.is-active {
            x: 25px !important; y: 25px !important; width: 400px !important; height: 880px !important; rx: 45px !important;
        }

        .app-icon {
            pointer-events: none;
            fill: none;
            stroke: #444;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: opacity 0.2s ease;
        }

        .active-app-state .app-icon {
            opacity: 0;
        }

        #boot-screen { display: block; opacity: 1; transition: opacity 0.8s ease; pointer-events: none; }
        #lock-clock, #fingerprint-sensor-group, #ui-elements, #nav-bar, #status-bar-interactive { 
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; 
        }

        .locked #lock-clock, .locked #fingerprint-sensor-group { opacity: 1; pointer-events: all; }
        .unlocked #ui-elements, .unlocked #nav-bar, .unlocked #status-bar-interactive { opacity: 1; pointer-events: all; }
        .boot-finished #boot-screen { opacity: 0; }

        @keyframes progress-fill { from { width: 0; } to { width: 200px; } }
        .start-progress #boot-progress-fill { animation: progress-fill 2s linear forwards; }

        #control-center { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(-930px); }
        .cc-active #control-center { transform: translateY(0); }

        .clickable { cursor: pointer; pointer-events: all; }
        .nav-icon { stroke: black; stroke-width: 5; stroke-linecap: round; fill: none; opacity: 0.7; pointer-events: none; }
        
        #sb-time, #sb-bat-fill { fill: #1f1f1f; }
        #sb-bat-stroke { stroke: #1f1f1f; }

        @keyframes ripple-effect {
            0% { transform: scale(1); opacity: 0; }
            0% { opacity: 0; }
            100% { transform: scale(3); opacity: 0; }
        }
        .ripple-wave { fill: none; stroke: white; opacity: 0; transform-origin: 225px 750px; pointer-events: none; }
        .rippling .ripple-wave { animation: ripple-effect 3.2s infinite ease-out; }

        #display-brightness-layer { pointer-events: none; transition: opacity 0.2s linear; }
    </style>
</head>

    <script>
        const body = document.body;
        let isBooted = false, isPowerOn = false, isLocked = true, isCCActive = false;
        let currentPage = 1, activeAppId = null;

        let startX = 0;
        let isDragging = false;
        let swipeCooldown = false;
        const screenArea = document.getElementById('screen-content');

        function handlePower() {
            if (!isBooted && !isPowerOn) {
                isPowerOn = true; body.classList.add('screen-on');
                setTimeout(() => {
                    document.getElementById('boot-logo').style.display = 'none';
                    document.getElementById('boot-loader').style.display = 'block';
                    document.getElementById('boot-progress-fill').style.animation = 'progress-fill 4s linear forwards';
                }, 1000);
                setTimeout(() => {
                    isBooted = true; body.classList.add('boot-finished', 'locked');
                }, 5500);
            } else {
                isPowerOn = !isPowerOn;
                if (isPowerOn) {
                    body.classList.add('screen-on');
                    isLocked = true; body.classList.replace('unlocked', 'locked');
                    currentPage = 1; updatePage();
                    closeAny();
                } else body.classList.remove('screen-on');
            }
        }

        let unlockTimer;
        function startUnlock() {
            if (!isPowerOn || !isLocked) return;
            document.getElementById('fingerprint-sensor-group').classList.add('rippling');
            unlockTimer = setTimeout(() => {
                isLocked = false;
                body.classList.replace('locked', 'unlocked');
                document.getElementById('fingerprint-sensor-group').classList.remove('rippling');
            }, 150);
        }
        function stopUnlock() {
            document.getElementById('fingerprint-sensor-group').classList.remove('rippling');
            clearTimeout(unlockTimer);
        }

        function handleSwipeStart(clientX) {
            if (isLocked || !isPowerOn || activeAppId || isCCActive) return;
            startX = clientX;
            isDragging = true;
        }

        function handleSwipeEnd(clientX) {
            if (!isDragging) return;
            isDragging = false;
            let diff = clientX - startX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentPage > 0) currentPage--;
                else if (diff < 0 && currentPage < 2) currentPage++;
                updatePage();
            }
        }

        screenArea.addEventListener('mousedown', e => handleSwipeStart(e.clientX));
        screenArea.addEventListener('mouseup', e => handleSwipeEnd(e.clientX));
        screenArea.addEventListener('mouseleave', e => handleSwipeEnd(e.clientX));

        screenArea.addEventListener('touchstart', e => handleSwipeStart(e.touches[0].clientX));
        screenArea.addEventListener('touchend', e => handleSwipeEnd(e.changedTouches[0].clientX));

        screenArea.addEventListener('wheel', e => {
            if (isLocked || !isPowerOn || activeAppId || isCCActive || swipeCooldown) return;
            if (Math.abs(e.deltaX) > 30) {
                if (e.deltaX < 0 && currentPage > 0) currentPage--;
                else if (e.deltaX > 0 && currentPage < 2) currentPage++;
                updatePage();
                swipeCooldown = true;
                setTimeout(() => swipeCooldown = false, 500);
            }
        });

        function updatePage() {
            document.getElementById('pages-container').style.transform = `translateX(${(1 - currentPage) * 400}px)`;
        }

        function openApp(id, el) {
            if (isLocked || isCCActive || activeAppId) return;
            activeAppId = id;
            el.classList.add('is-active');
            body.classList.add('active-app-state', 'app-active');
        }

        function closeAny() {
            const el = document.querySelector('.app-entity.is-active');
            if (el) el.classList.remove('is-active');
            body.classList.remove('active-app-state', 'app-active');
            activeAppId = null;
            if (isCCActive) toggleCC();
        }

        function handleHome() {
            if (activeAppId) closeAny();
            else { currentPage = 1; updatePage(); }
        }

        function toggleCC() {
            if (!isPowerOn || isLocked) return;
            isCCActive = !isCCActive;
            body.classList.toggle('cc-active');
        }

        function startBright(e) {
            const move = (ev) => {
                const rect = document.getElementById('bright-track').getBoundingClientRect();
                const cx = (ev.touches) ? ev.touches[0].clientX : ev.clientX;
                let x = cx - rect.left;
                x = Math.max(0, Math.min(340, x));
                document.getElementById('brightness-fill').setAttribute('width', x);
                document.getElementById('display-brightness-layer').style.opacity = 0.8 * (1 - (x / 340));
            };
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', () => { window.removeEventListener('mousemove', move); }, {once:true});
            window.addEventListener('touchend', () => { window.removeEventListener('touchmove', move); }, {once:true});
            move(e);
        }

        setInterval(() => {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.querySelectorAll('#lock-clock, #sb-time').forEach(t => t.textContent = time);
        }, 1000);
    </script>
</body>
</html>
